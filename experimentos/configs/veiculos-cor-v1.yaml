# Configuração do Experimento
experiment:
  name: "veiculos-cor-v1"
  description: "Classificação de cor de veículos com YOLOv8n"
  owner: "equipe-ia"
  priority: "high"

# Dataset
dataset:
  name: "veiculos-cor-v2"
  path: "/workspaces/datasets/veiculos"
  splits:
    train: 0.8
    val: 0.2
  classes:
    - branco
    - preto
    - prata
    - cinza
    - vermelho
    - azul
    - outro

# Modelo
model:
  base: "yolov8n.pt"
  task: "classify"
  pretrained: true

# Hiperparâmetros
hyperparams:
  epochs: 50
  batch: 16
  imgsz: 640
  device: "cuda"
  optimizer: "AdamW"
  lr0: 0.001
  lrf: 0.01
  momentum: 0.937
  weight_decay: 0.0005
  warmup_epochs: 3
  warmup_momentum: 0.8
  warmup_bias_lr: 0.1

# Data Augmentation
augmentation:
  mosaic: 1.0
  mixup: 0.0
  copy_paste: 0.0
  hsv_h: 0.015
  hsv_s: 0.7
  hsv_v: 0.4
  degrees: 0.0
  translate: 0.1
  scale: 0.5
  shear: 0.0
  perspective: 0.0
  flipud: 0.0
  fliplr: 0.5

# Logging
logging:
  project: "plenus-cloud-ia"
  tags: ["veiculos", "classificacao", "cor"]